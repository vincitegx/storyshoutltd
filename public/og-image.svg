<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>

    <!-- Full-panel orange brand gradient (same as .si-visual) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%"   style="stop-color:#FF5F2E"/>
      <stop offset="55%"  style="stop-color:#FF7C00"/>
      <stop offset="100%" style="stop-color:#FFB830"/>
    </linearGradient>

    <!-- White-to-warm-gold for the em tagline (same as .si-vis-h1 em) -->
    <linearGradient id="goldGrad" x1="190" y1="0" x2="1140" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFD282;stop-opacity:0.94"/>
    </linearGradient>

    <!-- White highlight top-right (same as .si-visual::before) -->
    <radialGradient id="glowTR" cx="90%" cy="10%" r="55%">
      <stop offset="0%"   style="stop-color:#FFFFFF;stop-opacity:0.20"/>
      <stop offset="100%" style="stop-color:#FF7C00;stop-opacity:0"/>
    </radialGradient>

    <!-- Dark depth bottom-left (same as .si-visual::before) -->
    <radialGradient id="depthBL" cx="10%" cy="92%" r="52%">
      <stop offset="0%"   style="stop-color:#000000;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#FF7C00;stop-opacity:0"/>
    </radialGradient>

    <!-- Warm centre bloom -->
    <radialGradient id="bloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#FFFFFF;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#FF7C00;stop-opacity:0"/>
    </radialGradient>

  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glowTR)"/>
  <rect width="1200" height="630" fill="url(#depthBL)"/>
  <rect width="1200" height="630" fill="url(#bloom)"/>

  <!-- ── Subtle dot grid — very faint, adds depth without clutter ── -->
  <g opacity="0.10" fill="#FFFFFF">
    <!-- Top-left cluster -->
    <circle cx="72"  cy="66"  r="3"/> <circle cx="112" cy="66"  r="3"/> <circle cx="152" cy="66"  r="3"/>
    <circle cx="72"  cy="106" r="3"/> <circle cx="112" cy="106" r="3"/> <circle cx="152" cy="106" r="3"/>
    <!-- Bottom-right cluster -->
    <circle cx="1048" cy="524" r="3"/> <circle cx="1088" cy="524" r="3"/> <circle cx="1128" cy="524" r="3"/>
    <circle cx="1048" cy="564" r="3"/> <circle cx="1088" cy="564" r="3"/> <circle cx="1128" cy="564" r="3"/>
  </g>

  <!-- ── Logo mark: "S" in frosted rounded square (mirrors .si-plm) ── -->
  <rect x="190" y="174" width="56" height="56" rx="15"
        fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.40)" stroke-width="1.5"/>
  <text x="218" y="214"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="28" font-weight="900"
        fill="#FFFFFF" text-anchor="middle">S</text>

  <!-- ── Wordmark: storyshout (mirrors .si-panel-logo) ── -->
  <text x="262" y="212"
        font-family="Arial, Helvetica, sans-serif"
        font-size="28" letter-spacing="0.04em">
    <tspan font-weight="600" fill="rgba(255,255,255,0.82)">story</tspan><tspan font-weight="800" fill="#FFFFFF">shout</tspan>
  </text>

  <!-- ── Kicker rule + label (mirrors .si-vis-kicker) ── -->
  <line x1="190" y1="288" x2="216" y2="288"
        stroke="rgba(255,255,255,0.50)" stroke-width="1.5"/>
  <text x="226" y="292"
        font-family="Arial, Helvetica, sans-serif"
        font-size="13" font-weight="700" letter-spacing="0.10em"
        fill="rgba(255,255,255,0.65)">AUDIENCE PROMOTION PLATFORM</text>

  <!-- ── Main headline line 1 (mirrors .si-vis-h1) ── -->
  <text x="190" y="374"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="80" font-weight="900" letter-spacing="-0.035em"
        fill="#FFFFFF">Your Story,</text>

  <!-- ── Main headline line 2 — white-to-gold gradient (mirrors em treatment) ── -->
  <text x="190" y="468"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="80" font-weight="900" letter-spacing="-0.035em"
        fill="url(#goldGrad)">Shared by Real People.</text>

  <!-- ── Sub text (mirrors .si-vis-sub) ── -->
  <text x="190" y="528"
        font-family="Arial, Helvetica, sans-serif"
        font-size="21" fill="rgba(255,255,255,0.60)" letter-spacing="0.01em">
    Brands get real reach · Shouters earn real coins · Everyone wins
  </text>

  <!-- ── Domain — bottom right ── -->
  <text x="1010" y="590"
        font-family="Arial, Helvetica, sans-serif"
        font-size="16" fill="rgba(255,255,255,0.38)" letter-spacing="0.08em"
        text-anchor="middle">storyshoutltd.com</text>

</svg>
